<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Google Drive 檔案下載</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .download-container { margin-bottom: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .btn {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-right: 10px;
        }
        .btn:hover { background-color: #45a049; }
        .btn-pdf { background-color: #f44336; }
        .btn-pdf:hover { background-color: #da190b; }
    </style>
</head>
<body>

    <h1>檔案下載列表</h1>

    <div class="download-container">

        <a class="btn btn-pdf" href="https://docs.google.com/spreadsheets/d/113HA7eyG3oQMF8dUO7dLKzjFV0EFYV1wA3CNfIWGD8g/export?format=pdf">下載 PDF</a>
    </div>
